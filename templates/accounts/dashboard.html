<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">

        <span class="navbar-brand mb-0 h1">
            Smart Student Portal
        </span>

        <a href="/accounts/logout/" class="btn btn-danger">
            Logout
        </a>

    </div>
</nav>

<div class="container mt-5">

    <div class="card shadow p-4">

        <h1 class="text-primary">
            Welcome to Dashboard
        </h1>

        <hr>

        <div class="row">

            <div class="col-md-4">
                <a href="/attendance/mark/" class="btn btn-success w-100 mb-3">
                    Mark Attendance
                </a>
            </div>

            <div class="col-md-4">
                <a href="/attendance/list/" class="btn btn-info w-100 mb-3">
                    View Attendance
                </a>
            </div>

            <div class="col-md-4">
                <a href="/marks/add/" class="btn btn-warning w-100 mb-3">
                    Add Marks
                </a>
            </div>

            <div class="col-md-4">
                <a href="/admin/" class="btn btn-dark w-100 mb-3">
                    Admin Panel
                </a>
            </div>

        </div>

    </div>

</div>

</body>
</html>
