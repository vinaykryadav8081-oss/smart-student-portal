<!DOCTYPE html>
<html>
<head>

    <title>Mark Attendance</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body style="background:#f4f6f9;">

<div class="container mt-5">

    <div class="card shadow p-5">

        <h1 class="mb-4">
            Mark Attendance
        </h1>

        <form method="POST">

            {% csrf_token %}

            <div class="mb-3">

                <label>
                    Select Student
                </label>

                <select name="student"
                        class="form-control">

                    {% for student in students %}

                    <option value="{{ student.id }}">

                        {{ student.username }}

                    </option>

                    {% endfor %}

                </select>

            </div>


            <div class="mb-3">

                <label>
                    Date
                </label>

                <input type="date"
                       name="date"
                       class="form-control">

            </div>


            <div class="mb-3">

                <label>
                    Status
                </label>

                <select name="status"
                        class="form-control">

                    <option value="Present">
                        Present
                    </option>

                    <option value="Absent">
                        Absent
                    </option>

                </select>

            </div>


            <button type="submit"
                    class="btn btn-primary">

                Save Attendance

            </button>

        </form>

    </div>

</div>

</body>
</html>
