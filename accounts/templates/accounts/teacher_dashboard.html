<!DOCTYPE html>
<html>
<head>

    <title>Teacher Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background:#f4f6f9;
        }

        .sidebar{
            height:100vh;
            background:#212529;
            color:white;
            padding-top:30px;
        }

        .sidebar a{
            color:white;
            text-decoration:none;
            display:block;
            padding:15px;
            margin-bottom:10px;
        }

        .sidebar a:hover{
            background:#495057;
            border-radius:5px;
        }

        .card-box{
            border-radius:15px;
            padding:30px;
            color:white;
        }

    </style>

</head>

<body>

<div class="container-fluid">

    <div class="row">

        <!-- Sidebar -->

        <div class="col-md-2 sidebar">

            <h3 class="text-center mb-5">
                Teacher Panel
            </h3>

            <a href="/attendance/mark/">
                Mark Attendance
            </a>

            <a href="/attendance/list/">
                Attendance List
            </a>

            <a href="/marks/add/">
                Add Marks
            </a>

            <a href="/marks/list/">
                Marks List
            </a>

            <a href="/accounts/logout/">
                Logout
            </a>

        </div>


        <!-- Main Content -->

        <div class="col-md-10 p-4">

            <h1 class="mb-4">
                Teacher Dashboard
            </h1>


            <!-- Cards -->

            <div class="row mb-5">

                <div class="col-md-6">

                    <div class="card-box bg-primary shadow">

                        <h3>
                            Attendance Management
                        </h3>

                        <p>
                            Manage student attendance records.
                        </p>

                    </div>

                </div>


                <div class="col-md-6">

                    <div class="card-box bg-success shadow">

                        <h3>
                            Marks Management
                        </h3>

                        <p>
                            Manage student marks records.
                        </p>

                    </div>

                </div>

            </div>


            <!-- Welcome Section -->

            <div class="card shadow">

                <div class="card-body">

                    <h3>
                        Welcome Teacher!
                    </h3>

                    <p>
                        Use the sidebar to manage attendance and marks.
                    </p>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
